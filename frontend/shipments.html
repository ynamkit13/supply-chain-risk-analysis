<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipments — Supply Chain Risk Analysis</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">Supply Chain <span>Risk Analysis</span></div>
        <nav>
            <a href="index.html">Dashboard</a>
            <a href="shipments.html" class="active">Shipments</a>
            <a href="risk.html">Risk Analysis</a>
            <a href="add_shipment.html">Add Shipment</a>
        </nav>
    </header>

    <!-- Page Content -->
    <div class="container">
        <div class="page-header">
            <h1>All Shipments</h1>
            <p>Full shipments table with multi-table join data</p>
        </div>

        <!-- Filters -->
        <div class="filters-bar">
            <label for="filter-search">Search:</label>
            <input type="text" id="filter-search" placeholder="Carrier, port...">

            <label for="filter-status">Status:</label>
            <select id="filter-status">
                <option value="">All</option>
            </select>

            <label for="filter-cargo">Cargo:</label>
            <select id="filter-cargo">
                <option value="">All</option>
            </select>
        </div>

        <!-- Shipments Table -->
        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Origin</th>
                        <th>Destination</th>
                        <th>Carrier</th>
                        <th>Cargo</th>
                        <th>Weight</th>
                        <th>Departure</th>
                        <th>Actual Arrival</th>
                        <th>Delay</th>
                        <th>Risk</th>
                        <th>Status</th>
                        <th>Update Status</th>
                    </tr>
                </thead>
                <tbody id="shipments-tbody">
                    <tr><td colspan="11" class="loading">Loading shipments...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="charts.js"></script>
    <script>loadShipments();</script>
</body>
</html>
